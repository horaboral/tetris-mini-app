<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tetris</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            background: #0a0a1a;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding: 4px;
        }
        #top-bar {
            display: flex;
            gap: 6px;
            align-items: stretch;
            width: 100%;
            max-width: 380px;
            flex-shrink: 0;
            padding: 4px 0;
        }
        .info-panel {
            background: #111122;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 4px 8px;
            text-align: center;
            flex-shrink: 0;
        }
        .info-panel canvas {
            display: block;
            margin: 0 auto;
        }
        .info-panel .label {
            font-size: 9px;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        #stats-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            padding: 0 10px;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }
        .stat span:first-child { color: #666; }
        .stat span:last-child { color: #fff; font-weight: bold; }
        #game-canvas {
            border: 2px solid #333;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,150,255,0.15);
            flex-shrink: 0;
            image-rendering: pixelated;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 380px;
            flex-shrink: 0;
            padding: 8px 0 4px;
            gap: 8px;
        }
        .ctrl-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .ctrl-btn {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #ccc;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
        }
        .ctrl-btn:active {
            background: #333;
        }
        .ctrl-btn.big {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            font-size: 28px;
        }
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay-text {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
            margin-bottom: 16px;
        }
        #overlay-sub {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="top-bar">
            <div class="info-panel" id="hold-panel">
                <div class="label">HOLD</div>
                <canvas id="hold-canvas"></canvas>
            </div>
            <div id="stats-panel">
                <div class="stat"><span>SCORE</span><span id="score">0</span></div>
                <div class="stat"><span>LINES</span><span id="lines">0</span></div>
                <div class="stat"><span>LEVEL</span><span id="level">1</span></div>
            </div>
            <div class="info-panel" id="next-panel">
                <div class="label">NEXT</div>
                <canvas id="next-canvas"></canvas>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="ctrl-group">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <button class="ctrl-btn" id="btn-right">▶</button>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn" id="btn-hold">H</button>
                <button class="ctrl-btn big" id="btn-rotate">↻</button>
                <button class="ctrl-btn" id="btn-ccw">↺</button>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn" id="btn-soft">▼</button>
                <button class="ctrl-btn big" id="btn-drop">⏬</button>
            </div>
        </div>
    </div>
    <div id="overlay">
        <div id="overlay-text">TETRIS</div>
        <div id="overlay-sub">Press ENTER or tap to start</div>
    </div>
    <script>
    (function() {
        'use strict';

        // === TELEGRAM WEBAPP ===
        const tg = window.Telegram?.WebApp;
        const isTelegram = !!tg;

        if (tg) {
            try {
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#0a0a1a');
                tg.setBackgroundColor('#0a0a1a');

                // Enable MainButton (hidden initially)
                tg.MainButton.setText('▶  PLAY')
                   .setColor('#1a1a2e')
                   .show();

                tg.onEvent('mainButtonClicked', () => {
                    if (gameState === 'idle' || gameState === 'gameover') {
                        startGame();
                    } else if (gameState === 'playing') {
                        pauseGame();
                    } else if (gameState === 'paused') {
                        resumeGame();
                    }
                });

                // Apply Telegram theme colors if available
                applyTelegramTheme();

                // BackButton: allow user to go back in Telegram
                if (tg.BackButton) {
                    tg.BackButton.onClick(() => {
                        if (gameState === 'playing') {
                            pauseGame();
                        }
                        tg.close();
                    });
                }
            } catch(e) {
                // Telegram WebApp init failed, continue without it
            }
        }

        // === GAME CONTROL FUNCTIONS (for MainButton & keyboard) ===
        function startGame() {
            gameState = 'playing';
            document.getElementById('overlay').classList.add('hidden');
            initGame();
            startMusic();
            lastTime = performance.now();
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(gameLoop);
            if (tg) {
                tg.MainButton.setText('⏸  PAUSE');
                tg.BackButton.hide();
            }
        }
        function pauseGame() {
            gameState = 'paused';
            stopMusic();
            sfxPause();
            document.getElementById('overlay-text').textContent = 'PAUSED';
            document.getElementById('overlay-sub').textContent = 'Press P or tap to resume';
            document.getElementById('overlay').classList.remove('hidden');
            if (tg) {
                tg.MainButton.setText('▶  RESUME');
                tg.BackButton.show();
            }
        }
        function resumeGame() {
            gameState = 'playing';
            startMusic();
            lastTime = performance.now();
            document.getElementById('overlay').classList.add('hidden');
            if (tg) {
                tg.MainButton.setText('⏸  PAUSE');
                tg.BackButton.hide();
            }
        }

        function applyTelegramTheme() {
            if (!tg || !tg.themeParams) return;
            const tp = tg.themeParams;
            if (tp.bg_color) document.querySelector('body').style.background = tp.bg_color;
        }

        // Haptic feedback helper
        function haptic(type) {
            if (!tg || !tg.HapticFeedback) return;
            try { tg.HapticFeedback.impactOccurred(type || 'light'); } catch(e) {}
        }

        // === CONSTANTS ===
        const COLS = 10;
        const ROWS = 20;
        const CELL = 30;
        const NEXT_CELL = 20;
        const HOLD_CELL = 20;
        const QUEUE_SIZE = 5;

        // Tetromino colors (standard guideline)
        const COLORS = {
            I: '#00f0f0',
            O: '#f0f000',
            T: '#a000f0',
            S: '#00f000',
            Z: '#f00000',
            J: '#0000f0',
            L: '#f0a000'
        };

        // Tetromino shapes (4 rotations each, except O)
        const SHAPES = {
            I: [
                [[0,0],[1,0],[2,0],[3,0]],
                [[1,0],[1,1],[1,2],[1,3]],
                [[0,1],[1,1],[2,1],[3,1]],
                [[2,0],[2,1],[2,2],[2,3]]
            ],
            O: [
                [[0,0],[1,0],[0,1],[1,1]]
            ],
            T: [
                [[0,0],[1,0],[2,0],[1,1]],
                [[1,0],[1,1],[1,2],[0,1]],
                [[1,0],[0,1],[1,1],[2,1]],
                [[1,0],[1,1],[1,2],[2,1]]
            ],
            S: [
                [[1,0],[2,0],[0,1],[1,1]],
                [[1,0],[1,1],[2,1],[2,2]],
                [[1,1],[2,1],[0,2],[1,2]],
                [[0,0],[0,1],[1,1],[1,2]]
            ],
            Z: [
                [[0,0],[1,0],[1,1],[2,1]],
                [[2,0],[1,1],[2,1],[1,2]],
                [[1,0],[2,0],[0,1],[1,1]],
                [[1,0],[0,1],[1,1],[0,2]]
            ],
            J: [
                [[0,0],[0,1],[1,1],[2,1]],
                [[1,0],[2,0],[1,1],[1,2]],
                [[0,0],[1,0],[2,0],[2,1]],
                [[1,0],[1,1],[0,2],[1,2]]
            ],
            L: [
                [[2,0],[0,1],[1,1],[2,1]],
                [[1,0],[1,1],[1,2],[2,2]],
                [[0,0],[1,0],[2,0],[0,1]],
                [[0,0],[1,0],[1,1],[1,2]]
            ]
        };

        // SRS wall kick data
        const KICKS_JLSTZ = [
            [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
            [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
            [[0,0],[1,0],[1,-1],[0,2],[1,2]],
            [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]]
        ];
        const KICKS_I = [
            [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
            [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
            [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
            [[0,0],[1,0],[-2,0],[1,2],[-2,-1]]
        ];

        // Speed table (ms per drop per level)
        const SPEEDS = [800,720,630,550,470,380,300,220,140,100,80,80,80,70,70,70,50,50,50,30];

        // === CANVAS SETUP ===
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = COLS * CELL;
        canvas.height = ROWS * CELL;

        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        nextCanvas.width = 5 * NEXT_CELL;
        nextCanvas.height = 4 * NEXT_CELL;

        const holdCanvas = document.getElementById('hold-canvas');
        const holdCtx = holdCanvas.getContext('2d');
        holdCanvas.width = 5 * HOLD_CELL;
        holdCanvas.height = 4 * HOLD_CELL;

        // === GAME STATE ===
        let board = [];
        let boardColors = [];
        let currentPiece = null;
        let nextQueue = [];
        let holdPiece = null;
        let canHold = true;
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameState = 'idle'; // idle, playing, paused, gameover
        let dropTimer = 0;
        let lastTime = 0;
        let lockDelay = 0;
        const LOCK_DELAY = 500;
        let animFrame = null;

        // === 7-BAG RANDOMIZER ===
        let bag = [];
        function fillBag() {
            const pieces = ['I','O','T','S','Z','J','L'];
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            bag.push(...pieces);
        }
        function nextPiece() {
            if (bag.length < QUEUE_SIZE) fillBag();
            return bag.shift();
        }

        // === BOARD ===
        function createBoard() {
            board = [];
            boardColors = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = new Array(COLS).fill(0);
                boardColors[r] = new Array(COLS).fill(null);
            }
        }

        // === PIECE ===
        function spawnPiece(type) {
            const rot = 0;
            const cells = SHAPES[type][SHAPES[type] === SHAPES.O ? 0 : rot];
            return {
                type,
                rot,
                x: Math.floor(COLS / 2) - 1,
                y: -1,
                cells
            };
        }

        function getCells(piece) {
            return piece.cells.map(c => [c[0] + piece.x, c[1] + piece.y]);
        }

        function valid(piece) {
            return getCells(piece).every(([x, y]) =>
                x >= 0 && x < COLS && y < ROWS && (y < 0 || !board[y][x])
            );
        }

        // === GAME INIT ===
        function initGame() {
            createBoard();
            bag = [];
            nextQueue = [];
            for (let i = 0; i < QUEUE_SIZE; i++) nextQueue.push(nextPiece());
            holdPiece = null;
            canHold = true;
            score = 0;
            lines = 0;
            level = 1;
            dropTimer = 0;
            lockDelay = 0;
            spawnNext();
            updateUI();
        }

        function spawnNext() {
            const type = nextQueue.shift();
            nextQueue.push(nextPiece());
            currentPiece = spawnPiece(type);
            canHold = true;
            lockDelay = 0;
            if (!valid(currentPiece)) {
                gameState = 'gameover';
            }
        }

        // === PLACE PIECE ===
        function placePiece() {
            getCells(currentPiece).forEach(([x, y]) => {
                if (y >= 0) {
                    board[y][x] = 1;
                    boardColors[y][x] = COLORS[currentPiece.type];
                }
            });
        }

        // === LINE CLEAR ===
        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(c => c)) {
                    board.splice(r, 1);
                    boardColors.splice(r, 1);
                    board.unshift(new Array(COLS).fill(0));
                    boardColors.unshift(new Array(COLS).fill(null));
                    cleared++;
                    r++;
                }
            }
            if (cleared) {
                const pts = [0, 100, 300, 500, 800];
                score += pts[cleared] * level;
                lines += cleared;
                level = Math.min(20, Math.floor(lines / 10) + 1);
                updateUI();
                sfxLineClear(cleared);
                haptic('heavy');
                if (cleared >= 4) {
                    haptic('rigid');
                }
            }
        }

        // === GHOST PIECE ===
        function ghostY() {
            let gy = currentPiece.y;
            while (true) {
                const test = { ...currentPiece, y: gy + 1 };
                if (!valid(test)) break;
                gy++;
            }
            return gy;
        }

        // === MOVEMENT ===
        function moveDx(dx) {
            if (gameState !== 'playing') return;
            const test = { ...currentPiece, x: currentPiece.x + dx };
            if (valid(test)) {
                currentPiece.x = test.x;
                lockDelay = 0;
            }
        }

        function softDrop() {
            if (gameState !== 'playing') return;
            const test = { ...currentPiece, y: currentPiece.y + 1 };
            if (valid(test)) {
                currentPiece.y = test.y;
                score += 1;
                lockDelay = 0;
                dropTimer = 0;
            }
        }

        function hardDrop() {
            if (gameState !== 'playing') return;
            let dropped = 0;
            while (true) {
                const test = { ...currentPiece, y: currentPiece.y + 1 };
                if (!valid(test)) break;
                currentPiece.y = test.y;
                dropped++;
            }
            score += dropped * 2;
            sfxHardDrop();
            haptic('medium');
            placePiece();
            clearLines();
            spawnNext();
            updateUI();
        }

        // === ROTATE (SRS) ===
        function rotate(dir) {
            if (gameState !== 'playing' || currentPiece.type === 'O') return;
            const oldRot = currentPiece.rot;
            const newRot = (oldRot + dir + 4) % 4;
            const newCells = SHAPES[currentPiece.type][newRot];
            const test = { ...currentPiece, rot: newRot, cells: newCells };
            const kicks = currentPiece.type === 'I' ? KICKS_I : KICKS_JLSTZ;
            const kickIndex = dir === 1 ? oldRot : newRot;
            for (const [kx, ky] of kicks[kickIndex]) {
                const kTest = { ...test, x: test.x + kx, y: test.y - ky };
                if (valid(kTest)) {
                    currentPiece.rot = newRot;
                    currentPiece.cells = newCells;
                    currentPiece.x = kTest.x;
                    currentPiece.y = kTest.y;
                    lockDelay = 0;
                    sfxRotate();
                    haptic('light');
                    return;
                }
            }
        }

        // === HOLD ===
        function holdSwap() {
            if (gameState !== 'playing' || !canHold) return;
            canHold = false;
            const type = currentPiece.type;
            if (holdPiece !== null) {
                currentPiece = spawnPiece(holdPiece);
                holdPiece = type;
            } else {
                holdPiece = type;
                spawnNext();
            }
        }

        // === UI UPDATE ===
        function updateUI() {
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('lines').textContent = lines;
            document.getElementById('level').textContent = level;
        }

        // === AUDIO ENGINE ===
        let audioCtx = null;
        let musicPlaying = false;
        let musicGain = null;
        let sfxGain = null;
        let musicTimeout = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(audioCtx.destination);
            sfxGain = audioCtx.createGain();
            sfxGain.gain.value = 0.25;
            sfxGain.connect(audioCtx.destination);
        }

        // Note frequency map
        function noteFreq(note, octave) {
            const notes = {'C':0,'D':2,'E':4,'F':5,'G':7,'A':9,'B':11};
            const semitone = (notes[note] || 0) + (octave - 4) * 12;
            return 440 * Math.pow(2, semitone / 12);
        }

        // Play a single note on a channel
        function playNote(freq, start, duration, type, gainNode, vol) {
            if (!audioCtx || !freq) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type || 'square';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(vol || 0.3, start);
            g.gain.exponentialRampToValueAtTime(0.001, start + duration - 0.01);
            osc.connect(g);
            g.connect(gainNode);
            osc.start(start);
            osc.stop(start + duration);
        }

        // Korobeiniki melody (Tetris Theme B)
        // Encoded as [note_string, duration_beats]
        // 'R' = rest
        const KOROB = [
            // Phrase 1
            ['E5',2],['D5',1],['E5',1],['D5',1],['C5',1],
            ['E5',2],['D5',1],['E5',1],['D5',1],['C5',1],
            // Phrase 2
            ['E5',2],['E5',1],['E5',1],['D5',1],['E5',1],['D5',2],['C5',2],
            // Phrase 3
            ['A4',2],['C5',1],['D5',1],['E5',2],['D5',2],['C5',2],
            // Phrase 4
            ['B4',2],['D5',1],['E5',1],['D5',2],['C5',2],['E5',2],
            // Phrase 5 (repeat)
            ['E5',2],['D5',1],['E5',1],['D5',1],['C5',1],
            ['E5',2],['D5',1],['E5',1],['D5',1],['C5',1],
            // Phrase 6
            ['E5',2],['E5',1],['E5',1],['D5',1],['E5',1],['D5',2],['C5',2],
            // Phrase 7
            ['A4',2],['C5',1],['D5',1],['E5',2],['D5',2],['C5',2],
            // Phrase 8
            ['B4',2],['D5',1],['E5',1],['D5',2],['C5',2],['E5',2],
        ];

        // Bass line (simple)
        const KOROB_BASS = [
            ['C3',4],['C3',4],
            ['C3',4],['C3',4],
            ['A2',4],['A2',4],
            ['F2',4],['F2',4],
            ['C3',4],['C3',4],
            ['C3',4],['C3',4],
            ['A2',4],['A2',4],
            ['F2',4],['F2',4],
        ];

        function parseNote(n) {
            if (n === 'R') return null;
            const m = n.match(/^([A-G])(#)?(\d)$/);
            if (!m) return null;
            const note = m[1];
            const octave = parseInt(m[3]);
            let freq = noteFreq(note, octave);
            if (m[2] === '#') freq *= Math.pow(2, 1/12);
            return freq;
        }

        function scheduleMusic() {
            if (!audioCtx || !musicPlaying) return;
            const tempo = 0.22; // seconds per beat
            const now = audioCtx.currentTime;
            let t = now + 0.05;

            // Schedule melody
            KOROB.forEach((item, i) => {
                const [note, dur] = item;
                const freq = parseNote(note);
                if (freq) {
                    playNote(freq, t, dur * tempo * 0.9, 'square', musicGain, 0.25);
                }
                t += dur * tempo;
            });

            // Schedule bass
            let bt = now + 0.05;
            KOROB_BASS.forEach((item) => {
                const [note, dur] = item;
                const freq = parseNote(note);
                if (freq) {
                    playNote(freq, bt, dur * tempo * 0.85, 'triangle', musicGain, 0.3);
                }
                bt += dur * tempo;
            });

            // Loop
            const totalMs = KOROB.reduce((s, [,d]) => s + d, 0) * tempo * 1000;
            musicTimeout = setTimeout(scheduleMusic, totalMs);
        }

        function startMusic() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            musicPlaying = true;
            scheduleMusic();
        }

        function stopMusic() {
            musicPlaying = false;
            if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
        }

        // SFX: Line clear
        function sfxLineClear(count) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const dur = 0.15;
            const baseFreq = count * 100 + 200;
            for (let i = 0; i < count; i++) {
                playNote(baseFreq + i * 150, now + i * 0.08, dur, 'square', sfxGain, 0.4);
            }
            // Sparkle tail
            playNote(880, now + count * 0.08, 0.3, 'sine', sfxGain, 0.2);
        }

        // SFX: Hard drop
        function sfxHardDrop() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.connect(g);
            g.connect(sfxGain);
            osc.start(now);
            osc.stop(now + 0.15);
        }

        // SFX: Game over
        function sfxGameOver() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = ['E5','D5','C5','B4','A4','G4','F4','E4'];
            let t = now;
            notes.forEach(n => {
                const freq = parseNote(n);
                playNote(freq, t, 0.25, 'square', sfxGain, 0.3);
                t += 0.2;
            });
        }

        // SFX: Rotate
        function sfxRotate() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            playNote(660, now, 0.06, 'square', sfxGain, 0.15);
        }

        // SFX: Pause
        function sfxPause() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            playNote(440, now, 0.1, 'triangle', sfxGain, 0.2);
            playNote(330, now + 0.1, 0.1, 'triangle', sfxGain, 0.2);
        }

        // === RENDER ===
        function drawCell(context, x, y, color, size) {
            const pad = 1;
            context.fillStyle = color;
            context.fillRect(x * size + pad, y * size + pad, size - pad * 2, size - pad * 2);
            // highlight
            context.fillStyle = 'rgba(255,255,255,0.15)';
            context.fillRect(x * size + pad, y * size + pad, size - pad * 2, 3);
            context.fillRect(x * size + pad, y * size + pad, 3, size - pad * 2);
            // shadow
            context.fillStyle = 'rgba(0,0,0,0.25)';
            context.fillRect(x * size + pad, y * size + size - pad * 2 - 3, size - pad * 2, 3);
            context.fillRect(x * size + size - pad * 2 - 3, y * size + pad, 3, size - pad * 2);
        }

        function render() {
            // Clear
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * CELL);
                ctx.lineTo(canvas.width, r * CELL);
                ctx.stroke();
            }
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * CELL, 0);
                ctx.lineTo(c * CELL, canvas.height);
                ctx.stroke();
            }

            // Board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] && boardColors[r][c]) {
                        drawCell(ctx, c, r, boardColors[r][c], CELL);
                    }
                }
            }

            if (currentPiece && gameState === 'playing') {
                // Ghost
                const gy = ghostY();
                currentPiece.cells.forEach(([cx, cy]) => {
                    const gx = cx + currentPiece.x;
                    const gy2 = cy + gy;
                    if (gy2 >= 0) {
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.fillRect(gx * CELL + 1, gy2 * CELL + 1, CELL - 2, CELL - 2);
                    }
                });

                // Current piece
                getCells(currentPiece).forEach(([x, y]) => {
                    if (y >= 0) {
                        drawCell(ctx, x, y, COLORS[currentPiece.type], CELL);
                    }
                });
            }

            // Next queue
            nextCtx.fillStyle = '#0d0d1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextQueue.slice(0, QUEUE_SIZE).forEach((type, i) => {
                const cells = SHAPES[type][0];
                const ox = Math.floor((5 - cells.reduce((a, c) => Math.max(a, c[0]), 0) - 1) / 2);
                const oy = Math.floor((4 - cells.reduce((a, c) => Math.max(a, c[1]), 0) - 1) / 2);
                cells.forEach(([cx, cy]) => {
                    drawCell(nextCtx, cx + ox, cy + oy + i * 2, COLORS[type], NEXT_CELL);
                });
            });

            // Hold
            holdCtx.fillStyle = '#0d0d1a';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPiece) {
                const cells = SHAPES[holdPiece][0];
                const ox = Math.floor((5 - cells.reduce((a, c) => Math.max(a, c[0]), 0) - 1) / 2);
                const oy = Math.floor((4 - cells.reduce((a, c) => Math.max(a, c[1]), 0) - 1) / 2);
                cells.forEach(([cx, cy]) => {
                    const col = canHold ? COLORS[holdPiece] : 'rgba(100,100,100,0.4)';
                    drawCell(holdCtx, cx + ox, cy + oy, col, HOLD_CELL);
                });
            }
        }

        // === GAME LOOP ===
        function gameLoop(time) {
            animFrame = requestAnimationFrame(gameLoop);
            if (gameState !== 'playing') return;

            const dt = time - lastTime;
            lastTime = time;
            dropTimer += dt;

            const speed = SPEEDS[Math.min(level - 1, SPEEDS.length - 1)];
            if (dropTimer >= speed) {
                dropTimer = 0;
                const test = { ...currentPiece, y: currentPiece.y + 1 };
                if (valid(test)) {
                    currentPiece.y = test.y;
                    lockDelay = 0;
                } else {
                    lockDelay += speed;
                    if (lockDelay >= LOCK_DELAY) {
                        placePiece();
                        clearLines();
                        spawnNext();
                    }
                }
            }

            render();
        }

        // === INPUT ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (gameState === 'idle' || gameState === 'gameover') {
                    startGame();
                }
                e.preventDefault();
                return;
            }

            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                if (gameState === 'playing') {
                    pauseGame();
                } else if (gameState === 'paused') {
                    resumeGame();
                }
                e.preventDefault();
                return;
            }

            if (gameState !== 'playing') return;

            switch (e.key) {
                case 'ArrowLeft': moveDx(-1); e.preventDefault(); break;
                case 'ArrowRight': moveDx(1); e.preventDefault(); break;
                case 'ArrowDown': softDrop(); e.preventDefault(); break;
                case 'ArrowUp': rotate(1); e.preventDefault(); break;
                case 'z': case 'Z': rotate(-1); break;
                case ' ': hardDrop(); e.preventDefault(); break;
                case 'c': case 'C': case 'Shift': holdSwap(); e.preventDefault(); break;
            }
        });

        // === OVERLAY HANDLER (pointerdown for unified touch/mouse) ===
        const overlay = document.getElementById('overlay');
        function overlayAction() {
            if (gameState === 'paused') {
                resumeGame();
            } else if (gameState === 'idle' || gameState === 'gameover') {
                startGame();
            }
        }
        overlay.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            overlayAction();
        });

        // === GAME OVER HANDLER ===
        const origSpawn = spawnNext;
        spawnNext = function() {
            origSpawn();
            if (gameState === 'gameover') {
                stopMusic();
                sfxGameOver();
                document.getElementById('overlay-text').textContent = 'GAME OVER';
                document.getElementById('overlay-sub').textContent = 'Score: ' + score.toLocaleString() + ' — Press ENTER or tap';
                document.getElementById('overlay').classList.remove('hidden');
                if (tg) {
                    tg.MainButton.setText('🔄  PLAY AGAIN');
                    tg.BackButton.show();
                }
            }
        };

        // Initial render
        createBoard();
        render();

    })();
    </script>
</body>
</html>
